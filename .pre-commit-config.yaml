repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: local
    hooks:
      - id: ascii-only
        name: ASCII-only check
        entry: scripts/ascii_guard.sh
        language: script
        types: [text]
        pass_filenames: true

      - id: internal-data-guard
        name: Block _internal/ files (except PROJECT_CONTEXT.md)
        entry: scripts/internal_data_guard.sh
        language: script
        types: [text]
        pass_filenames: true
