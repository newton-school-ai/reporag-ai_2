services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reporag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./src:/app/src
      - repo_data:/app/data
    restart: unless-stopped
    networks:
      - reporag-net

  neo4j:
    image: neo4j:5.26-community
    container_name: reporag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/reporag123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - reporag-net

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: reporag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - reporag-net

  postgres:
    image: postgres:16-alpine
    container_name: reporag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: reporag
      POSTGRES_PASSWORD: reporag
      POSTGRES_DB: reporag
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporag"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - reporag-net
    profiles:
      - production

networks:
  reporag-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  pg_data:
  repo_data:
